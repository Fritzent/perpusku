name: perpusku
description: "A Books Apps"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  dartz: ^0.10.1
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.3.0
  freezed_annotation: ^3.1.0
  gap: ^3.0.1
  get_it: ^9.2.1
  go_router: ^17.3.0
  image_picker: ^1.2.2
  injectable: ^3.0.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  logger: ^2.7.0
  lottie: ^3.3.3
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  supabase_flutter: ^2.14.2
  uuid: ^4.5.3
  bloc: ^9.2.1
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.3
  json_serializable: ^6.14.0
  injectable_generator: ^3.0.0
